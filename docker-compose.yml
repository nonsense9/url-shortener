services:
  app:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      # This anonymous volume ensures that the container's node_modules
      # don't conflict with your local Windows node_modules
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    # The --poll flag is critical for Windows/WSL2 file change detection
    command: >
      sh -c "npm install && npm start -- --host 0.0.0.0 --poll 2000"
