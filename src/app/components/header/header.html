<header class="sticky top-0 z-50 bg-white border-b border-slate-100 shadow-sm">
  <div class="max-w-4xl mx-auto px-6 flex items-center justify-between h-16">

    <a routerLink="/" class="text-xl font-bold text-blue-600 tracking-tight">
      shortly
    </a>


    <nav class="flex items-center gap-1">
      <a
        routerLink="/"
        routerLinkActive="text-blue-600 bg-blue-50"
        [routerLinkActiveOptions]="{ exact: true }"
        class="px-4 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-all"
      >
        Generate
      </a>
      <a
        routerLink="/link"
        routerLinkActive="text-blue-600 bg-blue-50"
        class="px-4 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-all"
      >
        My Links
      </a>
    </nav>

  </div>
</header>
