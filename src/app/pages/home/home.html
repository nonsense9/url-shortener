<div class="max-w-3xl mx-auto mt-20 p-6">
  <h1 class="text-5xl font-extrabold text-center mb-8 text-slate-900">Shorten your links.</h1>

  <form [formGroup]="urlForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="relative">
      <input
        formControlName="url"
        type="text"
        placeholder="Paste your long URL here..."
        class="w-full p-5 pr-32 text-lg border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:outline-none transition-all shadow-sm"
      />
      <button
        type="submit"
        [disabled]="urlForm.invalid || isGenerating()"
        class="absolute right-2 top-2 bottom-2 px-6 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 disabled:bg-slate-300 transition-all cursor-pointer flex items-center justify-center gap-2"
      >
        @if (isGenerating()) {
          <div class="h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent"></div>
          <span>Shortening...</span>
        } @else {
          <span>Shorten</span>
        }
      </button>
    </div>
    <p class="text-red-500 text-sm pl-1">
      @if (urlForm.get('url')?.hasError('pattern')) {
        Please enter a valid URL starting with http:// or https://
      }
    </p>

  </form>

  @if (latestLink()) {
    <div class="mt-8 p-6 bg-green-50 border border-green-200 rounded-2xl animate-fade-in">
      <p class="text-sm text-green-700 font-semibold mb-2">Success! Your link is ready:</p>
      <div class="flex items-center justify-between bg-white p-4 rounded-lg border border-green-100">
        <span class="text-xl font-mono font-bold text-blue-600">{{ latestLink()?.shortUrl }}</span>
        <button
          class="text-slate-500 hover:text-slate-800 transition-colors cursor-pointer"
          (click)="copyToClipboard(latestLink()?.shortUrl ?? '')"
        >
          {{ isCopied() ? '✓ Copied!' : 'Copy' }}
        </button>
      </div>

      <div class="mt-6 border-t border-green-200 pt-4">
        <label class="block text-sm font-medium text-slate-600 mb-2">Want tracking stats? Enter your email:</label>
        <input type="email" placeholder="email@example.com" class="w-full p-3 rounded-lg border border-slate-200">
      </div>
    </div>
  }
</div>
