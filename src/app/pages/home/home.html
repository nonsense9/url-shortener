<main class="max-w-3xl mx-auto mt-20 p-6">
  <h1 class="text-5xl font-extrabold text-center mb-8 text-slate-900">Shorten your links.</h1>

  <form [formGroup]="urlForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="relative">
      <label for="url-input" class="sr-only">Long URL to shorten</label>
      <input
        id="url-input"
        formControlName="url"
        type="url"
        autofocus
        placeholder="Paste your long URL here..."
        [attr.aria-invalid]="urlForm.get('url')?.invalid && urlForm.get('url')?.touched"
        aria-describedby="url-error"
        class="w-full p-5 pr-32 text-lg border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:outline-none transition-all shadow-sm"
      />
      <button
        type="submit"
        [disabled]="urlForm.invalid || isGenerating()"
        [attr.aria-busy]="isGenerating()"
        [attr.aria-label]="isGenerating() ? 'Shortening URL...' : 'Shorten URL'"
        class="absolute right-2 top-2 bottom-2 px-6 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 disabled:bg-slate-300 transition-all cursor-pointer flex items-center justify-center gap-2"
      >
        @if (isGenerating()) {
          <div class="h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent" aria-hidden="true"></div>
          <span>Shortening...</span>
        } @else {
          <span>Shorten</span>
        }
      </button>
    </div>

    <div id="url-error" class="min-h-[1.25rem]">
      @if (urlForm.get('url')?.hasError('pattern') && urlForm.get('url')?.touched) {
        <p class="text-red-500 text-sm pl-1" role="alert">
          Please enter a valid URL starting with http:// or https://
        </p>
      }
    </div>
  </form>

  @if (latestLink()) {
    <section class="mt-8 p-6 bg-green-50 border border-green-200 rounded-2xl animate-fade-in" aria-live="polite">
      <h2 class="text-sm text-green-700 font-semibold mb-2">Success! Your link is ready:</h2>
      <div class="flex items-center justify-between bg-white p-4 rounded-lg border border-green-100">
        <span class="text-xl font-mono font-bold text-blue-600" id="shortened-url-display">{{ latestLink()?.shortUrl }}</span>
        <button
          type="button"
          class="text-slate-500 hover:text-slate-800 transition-colors cursor-pointer px-3 py-1 rounded-md focus:outline-2 focus:outline-blue-500"
          (click)="copyToClipboard(latestLink()?.shortUrl ?? '')"
          [attr.aria-label]="isCopied() ? 'Link copied to clipboard' : 'Copy shortened link to clipboard'"
        >
          {{ isCopied() ? '✓ Copied!' : 'Copy' }}
        </button>
      </div>

      <div class="mt-6 border-t border-green-200 pt-4">
        <label for="stats-email" class="block text-sm font-medium text-slate-600 mb-2">Want tracking stats? Enter your email:</label>
        <input
          id="stats-email"
          type="email"
          placeholder="email@example.com"
          class="w-full p-3 rounded-lg border border-slate-200 focus:border-blue-500 focus:outline-none transition-all"
        >
      </div>
    </section>
  }
</main>
