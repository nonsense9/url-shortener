<div class="max-w-3xl mx-auto mt-12 p-6">
  <div class="mb-8">
    <a routerLink="/link" class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1 mb-4">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to all links
    </a>
    <h1 class="text-4xl font-extrabold text-slate-900">Link Details</h1>
  </div>

  @if (link(); as l) {
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
      <div class="space-y-8">
        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Shortened URL</label>
          <div class="flex items-center gap-3">
            <span class="text-2xl font-mono font-bold text-blue-600">{{ l.shortUrl }}</span>
            <span class="px-3 py-1 bg-green-50 text-green-700 text-xs font-bold rounded-lg border border-green-100">Active</span>
          </div>
        </div>

        <div>
          <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Original URL</label>
          <a [href]="l.originalUrl" target="_blank" class="text-slate-600 hover:text-blue-600 transition-colors break-all underline decoration-slate-200 underline-offset-4">
            {{ l.originalUrl }}
          </a>
        </div>

        <div class="grid grid-cols-2 gap-8 pt-8 border-t border-slate-100">
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">Created On</label>
            <span class="text-slate-900 font-medium">{{ l.createdAt | date:'longDate' }}</span>
          </div>
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">Total Clicks</label>
            <span class="text-2xl font-extrabold text-slate-900">{{ l.clicks }}</span>
          </div>
        </div>

        @if (l.email) {
          <div class="pt-8 border-t border-slate-100">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block">Owner Email</label>
            <span class="text-slate-600">{{ l.email }}</span>
          </div>
        }
      </div>
    </div>
  } @else {
    <div class="p-12 text-center bg-slate-50 rounded-3xl border border-slate-200">
      <p class="text-slate-500 font-medium">Link with ID "{{ id() }}" not found.</p>
    </div>
  }
</div>
